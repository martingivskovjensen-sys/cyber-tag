<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Tag</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <h1 class="glow-text">Cyber Tag</h1>
        
        <div id="lobby-container" class="glass-panel">
            <button id="btn-create" class="neon-button">Create Room</button>
            <div class="divider">OR</div>
            <div class="join-group">
                <input type="text" id="input-code" placeholder="4-Letter Code" maxlength="4" autocomplete="off" />
                <button id="btn-join" class="neon-button secondary">Join Room</button>
            </div>
            <div id="error-msg" class="error"></div>
        </div>

        <div id="room-container" class="glass-panel hidden">
            <h2>Room Code: <span id="display-code" class="glow-text"></span></h2>
            <p>Waiting for friends...</p>
            <p><strong>Controls:</strong> WASD or Arrows to move.</p>
            <p class="instruction">If you are <span style="color: #ff3366; text-shadow: 0 0 10px #ff3366;">RED</span>, you are IT!</p>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600" class="hidden"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
