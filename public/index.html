<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Tag</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <h1 class="glow-text">Cyber Tag</h1>
        
        <div id="lobby-container" class="glass-panel">
            <input type="text" id="input-username" placeholder="Your Username" maxlength="12" autocomplete="off" style="margin-bottom: 20px; width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; text-align: center; font-family: 'Outfit', sans-serif; font-size: 1.2rem;" />
            
            <p style="margin-bottom: 10px;">Pick Your Neon Color:</p>
            <div id="color-picker" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 25px;">
                <button class="color-btn selected" data-color="#00ffff" style="background: #00ffff;"></button>
                <button class="color-btn" data-color="#ff3366" style="background: #ff3366;"></button>
                <button class="color-btn" data-color="#00ff00" style="background: #00ff00;"></button>
                <button class="color-btn" data-color="#ffcc00" style="background: #ffcc00;"></button>
                <button class="color-btn" data-color="#ff6600" style="background: #ff6600;"></button>
                <button class="color-btn" data-color="#9d00ff" style="background: #9d00ff;"></button>
                <button class="color-btn" data-color="#ffffff" style="background: #ffffff;"></button>
            </div>

            <button id="btn-create" class="neon-button">Create Room</button>
            <div class="divider">OR</div>
            <div class="join-group">
                <input type="text" id="input-code" placeholder="4-Letter Code" maxlength="4" autocomplete="off" />
                <button id="btn-join" class="neon-button secondary">Join Room</button>
            </div>
            <div id="error-msg" class="error"></div>
        </div>

        <div id="room-container" class="glass-panel hidden">
            <h2>Room Code: <span id="display-code" class="glow-text" style="font-size: 3rem;"></span></h2>
            <p>Waiting for friends...</p>
            <p><strong>Controls:</strong> WASD or Arrows to move.</p>
            <p class="instruction">If you are <span style="color: #ff3366; text-shadow: 0 0 10px #ff3366;">RED</span>, you are IT!</p>
            <div id="bot-config" class="hidden" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <p style="margin-bottom: 10px;">Add Bots (AI):</p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
                    <button id="btn-bot-minus" class="neon-button" style="width: 50px; padding: 10px; border-color: #f0f; color: #f0f;">-</button>
                    <span id="bot-count" style="font-size: 1.5rem; font-weight: bold; min-width: 30px;">0</span>
                    <button id="btn-bot-plus" class="neon-button" style="width: 50px; padding: 10px; border-color: #f0f; color: #f0f;">+</button>
                </div>
            </div>
            <button id="btn-start" class="neon-button hidden" style="margin-top: 20px; border-color: #0f0; color: #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.2);">START GAME</button>
            <p id="game-status" style="margin-top: 10px; color: #888;">Lobby - Waiting for Host</p>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 class="victory-text">VICTORY!</h1>
        <h2 id="winner-name">Player Wins!</h2>
        <button id="btn-dismiss-victory" class="neon-button" style="margin-top: 30px;">Back to Lobby</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600" class="hidden"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
